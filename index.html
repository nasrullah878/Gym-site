<!DOCTYPE html>
<html>
<head>
  <title>Mobile Car Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
      text-align: center;
      color: white;
      overflow: hidden;
    }

    /* 📱 BIG FULL SCREEN CANVAS */
    canvas {
      width: 100vw;
      height: 80vh;
      display: block;
      background: #111;
    }

    #score {
      font-size: 20px;
      margin: 5px;
    }

    /* 📱 BIG MOBILE BUTTONS */
    .controls {
      position: fixed;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
    }

    button {
      width: 120px;
      height: 80px;
      font-size: 30px;
      border-radius: 15px;
      border: none;
      background: white;
    }

    #restart {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      font-size: 22px;
    }
  </style>
</head>

<body>

<h3>🚗 Mobile Car Game</h3>
<div id="score">Score: 0</div>

<canvas id="game"></canvas>

<button id="restart" onclick="restart()">🔄 Restart</button>

<div class="controls">
  <button id="left">⬅</button>
  <button id="right">➡</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 📱 FIX HIGH DPI (IMPORTANT FOR MOBILE ZOOM)
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight * 0.8;
}
resize();
window.addEventListener("resize", resize);

// 🚗 GAME STATE
let car, traffic, score, gameOver;
let keys = { left:false, right:false };

function init() {
  car = { x: 0, y: 0, w: 50, h: 80, speed: 6 };
  traffic = [];
  score = 0;
  gameOver = false;
  document.getElementById("restart").style.display = "none";
}

init();

// 📱 CENTER CAR ON SCREEN
function resetCar() {
  car.x = canvas.width / 2 - 25;
  car.y = canvas.height - 120;
}
resetCar();

// 🎮 INPUT FIX
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") keys.left = true;
  if (e.key === "ArrowRight") keys.right = true;
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft") keys.left = false;
  if (e.key === "ArrowRight") keys.right = false;
});

// 📱 BIG TOUCH BUTTONS (FIXED HOLD)
function bind(id, dir) {
  let b = document.getElementById(id);

  b.addEventListener("touchstart", e => {
    e.preventDefault();
    keys[dir] = true;
  });

  b.addEventListener("touchend", e => {
    e.preventDefault();
    keys[dir] = false;
  });

  b.addEventListener("mousedown", () => keys[dir] = true);
  b.addEventListener("mouseup", () => keys[dir] = false);
}

bind("left", "left");
bind("right", "right");

// 🚗 DRAW CAR
function drawCar() {
  ctx.fillStyle = "lime";
  ctx.fillRect(car.x, car.y, car.w, car.h);

  ctx.fillStyle = "black";
  ctx.fillRect(car.x + 15, car.y + 15, 20, 30);
}

// 🚙 TRAFFIC
function spawnTraffic() {
  traffic.push({
    x: Math.random() * (canvas.width - 60),
    y: -100,
    speed: 5
  });
}

// 🛣 ROAD
let lineY = 0;

function drawRoad() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#333";
  ctx.fillRect(canvas.width/2 - 80, 0, 160, canvas.height);

  ctx.fillStyle = "white";
  for (let i = 0; i < 10; i++) {
    ctx.fillRect(canvas.width/2 - 5,
      (i * 80 + lineY) % canvas.height,
      10, 40);
  }

  lineY += 5;
}

// 🚙 UPDATE TRAFFIC
function updateTraffic() {
  for (let i = 0; i < traffic.length; i++) {
    traffic[i].y += traffic[i].speed;

    // draw enemy car
    ctx.fillStyle = "red";
    ctx.fillRect(traffic[i].x, traffic[i].y, 50, 80);

    // collision
    if (
      car.x < traffic[i].x + 50 &&
      car.x + car.w > traffic[i].x &&
      car.y < traffic[i].y + 80 &&
      car.y + car.h > traffic[i].y
    ) {
      gameOver = true;
      document.getElementById("restart").style.display = "block";
    }

    if (traffic[i].y > canvas.height) {
      traffic.splice(i, 1);
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    }
  }
}

// 🚗 MOVE CAR (SMOOTH)
function updateCar() {
  if (keys.left) car.x -= car.speed;
  if (keys.right) car.x += car.speed;

  if (car.x < canvas.width/2 - 80) car.x = canvas.width/2 - 80;
  if (car.x > canvas.width/2 + 30) car.x = canvas.width/2 + 30;
}

// 🔄 restart
function restart() {
  init();
  resetCar();
}

// 🎮 LOOP
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();

  if (!gameOver) {
    drawCar();
    updateCar();
    updateTraffic();
  } else {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("💥 GAME OVER", 50, canvas.height/2);
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 80, canvas.height/2 + 40);
  }

  requestAnimationFrame(loop);
}

// ⏱ spawn cars
setInterval(() => {
  if (!gameOver) spawnTraffic();
}, 1000);

loop();
</script>

</body>
</html>
