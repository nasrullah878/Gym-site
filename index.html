<!DOCTYPE html>
<html>
<head>
  <title>Clean Traffic Car Game</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    canvas {
      background: #111;
      display: block;
      margin: auto;
      border: 2px solid white;
    }

    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: white;
    }

    #restart {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>🚗 Clean Traffic Car Game</h2>

<canvas id="game" width="400" height="600"></canvas>

<p id="score">Score: 0</p>

<button id="restart" onclick="restart()">🔄 Restart</button>

<div class="controls">
  <button id="left">⬅</button>
  <button id="right">➡</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🚗 GAME STATE
let car, traffic, keys, score, gameOver;

function init() {
  car = { x: 180, y: 500, w: 40, h: 70, speed: 6 };

  traffic = [];
  keys = { left:false, right:false };
  score = 0;
  gameOver = false;

  document.getElementById("restart").style.display = "none";
}

init();

// 🎮 INPUT FIX
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") keys.left = true;
  if (e.key === "ArrowRight") keys.right = true;
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft") keys.left = false;
  if (e.key === "ArrowRight") keys.right = false;
});

// 📱 TOUCH FIX
function bind(id, dir) {
  let b = document.getElementById(id);

  b.addEventListener("touchstart", () => keys[dir] = true);
  b.addEventListener("touchend", () => keys[dir] = false);

  b.addEventListener("mousedown", () => keys[dir] = true);
  b.addEventListener("mouseup", () => keys[dir] = false);
}

bind("left", "left");
bind("right", "right");

// 🚗 DRAW CAR
function drawCar(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 40, 70);

  ctx.fillStyle = "black";
  ctx.fillRect(x + 10, y + 10, 20, 20);
}

// 🚙 TRAFFIC CARS
function spawnTraffic() {
  let lanes = [140, 180, 220, 260];

  traffic.push({
    x: lanes[Math.floor(Math.random() * lanes.length)],
    y: -100,
    speed: 4 + Math.random() * 2
  });
}

// 🛣 WIDE ROAD
let lineY = 0;

function drawRoad() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, 400, 600);

  // road
  ctx.fillStyle = "#333";
  ctx.fillRect(120, 0, 160, 600);

  // lane lines
  ctx.fillStyle = "white";
  for (let i = 0; i < 10; i++) {
    ctx.fillRect(198, (i * 60 + lineY) % 600, 6, 30);
  }

  lineY += 4;
}

// 🚙 update traffic
function updateTraffic() {
  for (let i = 0; i < traffic.length; i++) {
    traffic[i].y += traffic[i].speed;

    drawCar(traffic[i].x, traffic[i].y, "red");

    // collision
    if (
      car.x < traffic[i].x + 40 &&
      car.x + car.w > traffic[i].x &&
      car.y < traffic[i].y + 70 &&
      car.y + car.h > traffic[i].y
    ) {
      gameOver = true;
      document.getElementById("restart").style.display = "block";
    }

    if (traffic[i].y > 650) {
      traffic.splice(i, 1);
      score++;
    }
  }
}

// 🚗 PLAYER MOVEMENT
function updateCar() {
  if (keys.left) car.x -= car.speed;
  if (keys.right) car.x += car.speed;

  if (car.x < 120) car.x = 120;
  if (car.x > 240) car.x = 240;
}

// 🔄 restart
function restart() {
  init();
}

// 📊 score
function updateScore() {
  document.getElementById("score").innerText = "Score: " + score;
}

// 🎮 loop
function loop() {
  ctx.clearRect(0, 0, 400, 600);

  drawRoad();

  if (!gameOver) {
    drawCar(car.x, car.y, "lime");
    updateCar();
    updateTraffic();
    updateScore();
  } else {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("💥 GAME OVER", 90, 250);
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 130, 300);
  }

  requestAnimationFrame(loop);
}

// ⏱ spawn traffic
setInterval(() => {
  if (!gameOver) spawnTraffic();
}, 900);

loop();
</script>

</body>
</html>
