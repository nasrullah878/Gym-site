<!DOCTYPE html>
<html>
<head>
  <title>Modern Car Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
      overflow: hidden;
    }

    canvas {
      background: #222;
      display: block;
      margin: auto;
      border: 3px solid white;
    }

    .controls {
      position: fixed;
      bottom: 15px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
    }

    #restart {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>🚗 Modern Car Game</h2>

<canvas id="game" width="350" height="600"></canvas>

<p id="info">Score: 0</p>

<button id="restart" onclick="restart()">🔄 Restart</button>

<div class="controls">
  <button ontouchstart="move(-1)" onclick="move(-1)">⬅</button>
  <button ontouchstart="move(1)" onclick="move(1)">➡</button>
</div>

<!-- 🎧 SOUND -->
<audio id="crashSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="coinSound" src="https://www.soundjay.com/button/beep-09.wav"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let car, enemies, coins, score, gameOver;
let dir = 0;

function init() {
  car = { x: 155, y: 500, w: 40, h: 70 };
  enemies = [];
  coins = [];
  score = 0;
  gameOver = false;
  document.getElementById("restart").style.display = "none";
}

init();

// 🎮 movement
function move(d) {
  dir = d;

  // 🔊 unlock sound on first interaction (important fix)
  document.getElementById("crashSound").play().catch(()=>{});
}

// 🚗 spawn enemy
function spawnEnemy() {
  enemies.push({ x: Math.random() * 310, y: -80 });
}

// 💰 spawn coin
function spawnCoin() {
  coins.push({ x: Math.random() * 310, y: -50 });
}

// 🎧 sounds
function playCrash() {
  document.getElementById("crashSound").play();
}

function playCoin() {
  document.getElementById("coinSound").play();
}

// 🚗 draw car (real shape)
function drawCar() {
  ctx.fillStyle = "lime";
  ctx.fillRect(car.x, car.y, car.w, car.h);

  ctx.fillStyle = "black";
  ctx.fillRect(car.x + 8, car.y + 10, 24, 20);
}

// 🚙 enemies
function drawEnemies() {
  ctx.fillStyle = "red";
  enemies.forEach(e => ctx.fillRect(e.x, e.y, 40, 70));
}

// 💰 coins
function drawCoins() {
  ctx.fillStyle = "gold";
  coins.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, 8, 0, Math.PI * 2);
    ctx.fill();
  });
}

// 🔁 update game
function update() {
  if (gameOver) return;

  car.x += dir * 5;
  if (car.x < 0) car.x = 0;
  if (car.x > 310) car.x = 310;

  enemies.forEach(e => e.y += 6);
  coins.forEach(c => c.y += 5);

  // collision enemies
  enemies.forEach((e, i) => {
    if (
      car.x < e.x + 40 &&
      car.x + car.w > e.x &&
      car.y < e.y + 70 &&
      car.y + car.h > e.y
    ) {
      playCrash();
      gameOver = true;
      document.getElementById("restart").style.display = "block";
    }

    if (e.y > 600) enemies.splice(i, 1);
  });

  // coins collect
  coins.forEach((c, i) => {
    if (
      car.x < c.x + 10 &&
      car.x + car.w > c.x &&
      car.y < c.y + 10 &&
      car.y + car.h > c.y
    ) {
      playCoin();
      score++;
      coins.splice(i, 1);
    }
  });

  document.getElementById("info").innerText = "Score: " + score;
}

// 🔄 restart
function restart() {
  init();
}

// 🎮 loop
function loop() {
  ctx.clearRect(0, 0, 350, 600);

  // road
  ctx.fillStyle = "#333";
  ctx.fillRect(0, 0, 350, 600);

  if (!gameOver) {
    drawCar();
    drawEnemies();
    drawCoins();
    update();
  } else {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("💥 GAME OVER", 70, 250);
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 120, 300);
  }

  requestAnimationFrame(loop);
}

// ⏱ spawn system
setInterval(() => {
  if (!gameOver) {
    spawnEnemy();
    if (Math.random() > 0.6) spawnCoin();
  }
}, 900);

loop();
</script>

</body>
</html>
