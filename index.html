<!DOCTYPE html>
<html>
<head>
  <title>Car Game</title>
  <style>
    body {
      text-align: center;
      background: #111;
      color: white;
      font-family: Arial;
    }

    canvas {
      background: #222;
      display: block;
      margin: auto;
      border: 2px solid white;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h2>🚗 Car Racing Game</h2>
<canvas id="game" width="400" height="600"></canvas>

<br>
<button onclick="moveLeft()">⬅ Left</button>
<button onclick="moveRight()">➡ Right</button>

<p id="score">Score: 0</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let car = { x: 180, y: 500, w: 40, h: 60 };
let obstacles = [];
let score = 0;
let gameOver = false;

// draw car
function drawCar() {
  ctx.fillStyle = "lime";
  ctx.fillRect(car.x, car.y, car.w, car.h);
}

// draw obstacles
function drawObstacles() {
  ctx.fillStyle = "red";
  obstacles.forEach(obs => {
    ctx.fillRect(obs.x, obs.y, 40, 40);
  });
}

// move obstacles
function updateObstacles() {
  for (let i = 0; i < obstacles.length; i++) {
    obstacles[i].y += 5;

    // collision check
    if (
      car.x < obstacles[i].x + 40 &&
      car.x + car.w > obstacles[i].x &&
      car.y < obstacles[i].y + 40 &&
      car.y + car.h > obstacles[i].y
    ) {
      gameOver = true;
    }

    // score increase
    if (obstacles[i].y > 600) {
      obstacles.splice(i, 1);
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    }
  }
}

// spawn obstacles
function spawnObstacle() {
  let x = Math.floor(Math.random() * 360);
  obstacles.push({ x: x, y: 0 });
}

// controls
function moveLeft() {
  if (car.x > 0) car.x -= 20;
}

function moveRight() {
  if (car.x < 360) car.x += 20;
}

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") moveLeft();
  if (e.key === "ArrowRight") moveRight();
});

// game loop
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("Game Over", 120, 300);
    return;
  }

  drawCar();
  drawObstacles();
  updateObstacles();

  requestAnimationFrame(gameLoop);
}

// spawn loop
setInterval(spawnObstacle, 1000);

// start game
gameLoop();
</script>

</body>
</html>
