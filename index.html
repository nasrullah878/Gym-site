<!DOCTYPE html>
<html>
<head>
  <title>Touch Car Game</title>
  <style>
    body {
      text-align: center;
      background: #111;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    canvas {
      background: #222;
      display: block;
      margin: auto;
      border: 2px solid white;
    }

    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    button {
      padding: 20px 30px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<h2>🚗 Car Game (Mobile + Laptop)</h2>

<canvas id="game" width="350" height="600"></canvas>

<p id="score">Score: 0</p>

<div class="controls">
  <button ontouchstart="moveLeft()" onclick="moveLeft()">⬅</button>
  <button ontouchstart="moveRight()" onclick="moveRight()">➡</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let car = { x: 155, y: 500, w: 40, h: 60 };
let obstacles = [];
let score = 0;
let gameOver = false;

// draw car
function drawCar() {
  ctx.fillStyle = "lime";
  ctx.fillRect(car.x, car.y, car.w, car.h);
}

// draw obstacles
function drawObstacles() {
  ctx.fillStyle = "red";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, 40, 40);
  });
}

// update obstacles
function updateObstacles() {
  for (let i = 0; i < obstacles.length; i++) {
    obstacles[i].y += 6;

    // collision
    if (
      car.x < obstacles[i].x + 40 &&
      car.x + car.w > obstacles[i].x &&
      car.y < obstacles[i].y + 40 &&
      car.y + car.h > obstacles[i].y
    ) {
      gameOver = true;
    }

    // score
    if (obstacles[i].y > 600) {
      obstacles.splice(i, 1);
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    }
  }
}

// spawn obstacles
function spawnObstacle() {
  let x = Math.floor(Math.random() * 310);
  obstacles.push({ x: x, y: 0 });
}

// controls
function moveLeft() {
  if (car.x > 0) car.x -= 25;
}

function moveRight() {
  if (car.x < 310) car.x += 25;
}

// keyboard support
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") moveLeft();
  if (e.key === "ArrowRight") moveRight();
});

// game loop
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("Game Over", 100, 300);
    return;
  }

  drawCar();
  drawObstacles();
  updateObstacles();

  requestAnimationFrame(gameLoop);
}

// start
setInterval(spawnObstacle, 900);
gameLoop();
</script>

</body>
</html>
