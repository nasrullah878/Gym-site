<!DOCTYPE html>
<html>
<head>
  <title>Clean Car Game</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    canvas {
      background: #111;
      display: block;
      margin: auto;
      border: 2px solid white;
    }

    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: white;
    }

    #restart {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>🚗 Clean Car Game</h2>

<canvas id="game" width="350" height="600"></canvas>

<p id="score">Score: 0</p>

<button id="restart" onclick="restart()">🔄 Restart</button>

<div class="controls">
  <button id="left">⬅</button>
  <button id="right">➡</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let car, keys, score, gameOver;

function init() {
  car = { x: 155, y: 500, w: 40, h: 70, speed: 6 };
  keys = { left:false, right:false };
  score = 0;
  gameOver = false;

  document.getElementById("restart").style.display = "none";
}

init();

// 🎮 keyboard control (smooth hold)
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") keys.left = true;
  if (e.key === "ArrowRight") keys.right = true;
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft") keys.left = false;
  if (e.key === "ArrowRight") keys.right = false;
});

// 📱 touch control fix
function bind(btn, dir) {
  let b = document.getElementById(btn);

  b.addEventListener("touchstart", () => keys[dir] = true);
  b.addEventListener("touchend", () => keys[dir] = false);

  b.addEventListener("mousedown", () => keys[dir] = true);
  b.addEventListener("mouseup", () => keys[dir] = false);
}

bind("left", "left");
bind("right", "right");

// 🚗 draw car (simple)
function drawCar() {
  ctx.fillStyle = "lime";
  ctx.fillRect(car.x, car.y, car.w, car.h);

  ctx.fillStyle = "black";
  ctx.fillRect(car.x + 10, car.y + 10, 20, 20);
}

// 🛣 simple road
let lineY = 0;

function drawRoad() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, 350, 600);

  ctx.fillStyle = "#333";
  ctx.fillRect(150, 0, 50, 600);

  ctx.fillStyle = "white";
  for (let i = 0; i < 10; i++) {
    ctx.fillRect(172, (i * 60 + lineY) % 600, 6, 30);
  }

  lineY += 4;
}

// 🎮 update
function update() {
  if (gameOver) return;

  if (keys.left) car.x -= car.speed;
  if (keys.right) car.x += car.speed;

  if (car.x < 120) car.x = 120;
  if (car.x > 190) car.x = 190;

  score++;
  document.getElementById("score").innerText = "Score: " + score;
}

// 🔄 restart
function restart() {
  init();
}

// 🎮 loop
function loop() {
  ctx.clearRect(0, 0, 350, 600);

  drawRoad();

  if (!gameOver) {
    drawCar();
    update();
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
