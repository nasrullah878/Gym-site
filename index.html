<!DOCTYPE html>
<html>
<head>
  <title>Ultra Car Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    canvas {
      background: #222;
      display: block;
      margin: auto;
      border: 3px solid white;
    }

    .controls {
      position: fixed;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }

    #shop {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>🚗 Ultra Car Game</h2>

<canvas id="game" width="350" height="600"></canvas>

<p id="info">Score: 0 | Coins: 0 | Car: Sport</p>

<button onclick="openShop()">🛒 Shop</button>
<button onclick="restartGame()">🔄 Restart</button>

<div class="controls">
  <button ontouchstart="startDrag(-1)" ontouchend="stopDrag()">⬅</button>
  <button ontouchstart="startDrag(1)" ontouchend="stopDrag()">➡</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let car, enemies, coins, score, gameOver;
let coinsCollected = 0;
let carType = "sport";
let steering = 0;

// 🚗 CAR SKINS
const cars = {
  sport: "lime",
  truck: "orange"
};

function init() {
  car = { x: 155, y: 500, w: 40, h: 70 };
  enemies = [];
  coins = [];
  score = 0;
  coinsCollected = 0;
  gameOver = false;
}

init();

// 🌆 curved road effect
let roadOffset = 0;

// 🎮 steering (drag)
function startDrag(dir) {
  steering = dir;
}

function stopDrag() {
  steering = 0;
}

// 🚗 move car
function updateCar() {
  car.x += steering * 6;
  if (car.x < 0) car.x = 0;
  if (car.x > 310) car.x = 310;
}

// 🚙 enemies
function spawnEnemy() {
  enemies.push({ x: Math.random() * 310, y: -80 });
}

// 💰 coins
function spawnCoin() {
  coins.push({ x: Math.random() * 310, y: -50 });
}

// 🎨 draw road (CURVED EFFECT)
function drawRoad() {
  ctx.fillStyle = "#333";
  ctx.fillRect(0, 0, 350, 600);

  ctx.fillStyle = "white";
  roadOffset += 3;

  for (let i = 0; i < 10; i++) {
    let x = 170 + Math.sin((i + roadOffset * 0.02)) * 50;
    ctx.fillRect(x, i * 70, 10, 40);
  }
}

// 🚗 car
function drawCar() {
  ctx.fillStyle = cars[carType];
  ctx.fillRect(car.x, car.y, car.w, car.h);

  ctx.fillStyle = "black";
  ctx.fillRect(car.x + 8, car.y + 10, 24, 20);
}

// 🚙 enemies
function drawEnemies() {
  ctx.fillStyle = "red";
  enemies.forEach(e => {
    ctx.fillRect(e.x, e.y, 40, 70);
  });
}

// 💰 coins
function drawCoins() {
  ctx.fillStyle = "gold";
  coins.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, 8, 0, Math.PI * 2);
    ctx.fill();
  });
}

// 🔁 update game objects
function update() {
  updateCar();

  enemies.forEach(e => e.y += 5);
  coins.forEach(c => c.y += 5);

  // collision enemy
  enemies.forEach((e, i) => {
    if (
      car.x < e.x + 40 &&
      car.x + car.w > e.x &&
      car.y < e.y + 70 &&
      car.y + car.h > e.y
    ) {
      gameOver = true;
    }

    if (e.y > 600) enemies.splice(i, 1);
  });

  // coin collect
  coins.forEach((c, i) => {
    if (
      car.x < c.x + 10 &&
      car.x + car.w > c.x &&
      car.y < c.y + 10 &&
      car.y + car.h > c.y
    ) {
      coinsCollected++;
      coins.splice(i, 1);
    }
  });

  score++;
}

// 🛒 shop
function openShop() {
  let choice = prompt("Choose car: sport / truck");
  if (choice === "sport" || choice === "truck") {
    carType = choice;
  }
}

// 🔄 restart
function restartGame() {
  init();
}

// 📊 UI
function updateInfo() {
  document.getElementById("info").innerText =
    "Score: " + score +
    " | Coins: " + coinsCollected +
    " | Car: " + carType;
}

// 🎮 loop
function loop() {
  ctx.clearRect(0, 0, 350, 600);

  drawRoad();

  if (!gameOver) {
    drawCar();
    drawEnemies();
    drawCoins();
    update();
    updateInfo();
  } else {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("💥 GAME OVER", 70, 250);
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 120, 300);

    // save leaderboard
    localStorage.setItem("bestScore",
      Math.max(score, localStorage.getItem("bestScore") || 0)
    );
  }

  requestAnimationFrame(loop);
}

// ⏱ spawn system
setInterval(() => {
  if (!gameOver) {
    spawnEnemy();
    if (Math.random() > 0.5) spawnCoin();
  }
}, 800);

loop();
</script>

</body>
</html>
